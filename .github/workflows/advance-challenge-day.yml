name: Advance Challenge Day

on:
  schedule:
    # Para testing: cada 5 minutos
    - cron: '*/5 * * * *'
    # Para producción: cada día a las 6:00 AM UTC
    # - cron: '0 6 * * *'
  workflow_dispatch: # Permitir ejecución manual

jobs:
  advance-challenge-day:
    runs-on: ubuntu-latest
    
    steps:
      - name: Advance challenge day
        run: |
          echo "📅 Advancing 30-day challenge..."
          echo "🕒 Current time: $(date)"
          
          # Obtener estado actual primero
          echo "📊 Getting current challenge state..."
          current_response=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            "https://8a86-2802-8010-9545-a100-fb0d-e8e9-3d82-3922.ngrok-free.app/api/supabase/challenge-day")
          
          echo "📋 Current state: $current_response"
          
          if echo "$current_response" | grep -q '"success":true'; then
            current_day=$(echo "$current_response" | grep -o '"challengeDay":[0-9]*' | cut -d':' -f2)
            calendar_day=$(echo "$current_response" | grep -o '"calendarDay":[0-9]*' | cut -d':' -f2)
            echo "📍 Current challenge day: $current_day, Calendar day: $calendar_day"
          fi
          
          # Avanzar al siguiente día
          echo "🔄 Advancing to next day..."
          advance_response=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Cron" \
            "https://8a86-2802-8010-9545-a100-fb0d-e8e9-3d82-3922.ngrok-free.app/api/supabase/challenge-day")
          
          echo "📝 Advance Response: $advance_response"
          
          # Verificar si el avance fue exitoso
          if echo "$advance_response" | grep -q '"success":true'; then
            echo "✅ Challenge day advanced successfully!"
            
            # Extraer información del nuevo estado
            new_challenge_day=$(echo "$advance_response" | grep -o '"challengeDay":[0-9]*' | cut -d':' -f2)
            new_calendar_day=$(echo "$advance_response" | grep -o '"calendarDay":[0-9]*' | cut -d':' -f2)
            day_name=$(echo "$advance_response" | grep -o '"dayName":"[^"]*"' | cut -d'"' -f4)
            
            echo "📊 New challenge day: $new_challenge_day"
            echo "📅 New calendar day: $new_calendar_day ($day_name)"
            
            # Verificar si se saltó domingo
            if echo "$advance_response" | grep -q '"skippedSunday":true'; then
              echo "⏭️ Sunday was skipped (no routine on Sundays)"
            fi
            
            # Verificar si el challenge se completó
            if echo "$advance_response" | grep -q '"challengeCompleted":true'; then
              echo "🏁 Challenge completed! Restarting from day 1"
            fi
            
            # Mostrar rutina actual si está disponible
            if echo "$advance_response" | grep -q '"newRoutine"'; then
              routine_title=$(echo "$advance_response" | grep -o '"title":"[^"]*"' | cut -d'"' -f4)
              if [ "$routine_title" != "null" ] && [ ! -z "$routine_title" ]; then
                echo "🎯 Today's routine: $routine_title"
              else
                echo "🔒 No routine available for today"
              fi
            fi
            
          else
            echo "❌ Failed to advance challenge day"
            echo "Response: $advance_response"
            
            # Verificar si hay un error específico
            if echo "$advance_response" | grep -q '"error"'; then
              error_message=$(echo "$advance_response" | grep -o '"error":"[^"]*"' | cut -d'"' -f4)
              echo "❌ Error details: $error_message"
            fi
            
            exit 1
          fi
