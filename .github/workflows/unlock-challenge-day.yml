name: Unlock Next Challenge Day

# NOTA: Con el nuevo sistema de progreso individual por usuario, 
# este workflow maneja el estado global del challenge pero cada usuario
# desbloquea sus rutinas individualmente a medianoche cuando completa la anterior.
# Este workflow sigue siendo útil para el tracking general del programa.

on:
  schedule:
    # Para producción: cada día a las 00:05 UTC (5 minutos después de medianoche)
    - cron: '5 0 * * *'
    # Para testing: se puede ejecutar manualmente
  workflow_dispatch: # Permitir ejecución manual

jobs:
  unlock-next-day:
    runs-on: ubuntu-latest
    
    steps:
      - name: Unlock next challenge day
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          echo "🔓 Unlocking next day of 30-day challenge..."
          echo "🕒 Current time: $(date)"
          
          # Configurar la URL base
          if [ -z "$API_BASE_URL" ]; then
            API_URL="https://your-production-domain.vercel.app"
            echo "⚠️  Using default API URL (set API_BASE_URL secret for production)"
          else
            API_URL="$API_BASE_URL"
          fi
          echo "🌐 Using API URL: $API_URL"
          
          # Obtener estado actual primero
          echo "📊 Getting current challenge state..."
          current_response=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            "$API_URL/api/supabase/challenge-day")
          
          echo "📋 Current state: $current_response"
          
          if echo "$current_response" | grep -q '"success":true'; then
            current_day=$(echo "$current_response" | grep -o '"challengeDay":[0-9]*' | cut -d':' -f2)
            calendar_day=$(echo "$current_response" | grep -o '"calendarDay":[0-9]*' | cut -d':' -f2)
            echo "📍 Current challenge day: $current_day"
            echo "� Current calendar day: $calendar_day"
            
            # Mostrar la rutina de hoy si está disponible
            if echo "$current_response" | grep -q '"currentRoutine"'; then
              todays_routine=$(echo "$current_response" | grep -o '"title":"[^"]*"' | cut -d'"' -f4)
              if [ "$todays_routine" != "null" ] && [ ! -z "$todays_routine" ]; then
                echo "🎯 Today's routine: $todays_routine"
              fi
            fi
          fi
          
          # Avanzar al siguiente día
          echo "🔄 Unlocking next day..."
          unlock_response=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Cron" \
            "$API_URL/api/supabase/challenge-day")
          
          echo "📝 Unlock Response: $unlock_response"
          
          # Verificar si el unlock fue exitoso
          if echo "$unlock_response" | grep -q '"success":true'; then
            echo "✅ Next challenge day unlocked successfully!"
            
            # Extraer información del nuevo estado
            new_day=$(echo "$unlock_response" | grep -o '"challengeDay":[0-9]*' | tail -1 | cut -d':' -f2)
            calendar_day=$(echo "$unlock_response" | grep -o '"calendarDay":[0-9]*' | cut -d':' -f2)
            day_name=$(echo "$unlock_response" | grep -o '"dayName":"[^"]*"' | cut -d'"' -f4)
            
            echo "📊 New challenge day: $new_day"
            echo "� Calendar day: $calendar_day ($day_name)"
            
            # Verificar si se saltó domingo
            if echo "$unlock_response" | grep -q '"skippedSunday":true'; then
              echo "⏭️ Sunday was skipped (no routine on Sundays)"
            fi
            
            # Verificar si el challenge se completó y resetó
            if echo "$unlock_response" | grep -q '"challengeCompleted":true'; then
              echo "🏁 Challenge completed! Restarted from day 1"
            fi
            
            # Mostrar la nueva rutina desbloqueada
            if echo "$unlock_response" | grep -q '"newRoutine"'; then
              new_routine_title=$(echo "$unlock_response" | grep -o '"title":"[^"]*"' | tail -1 | cut -d'"' -f4)
              if [ "$new_routine_title" != "null" ] && [ ! -z "$new_routine_title" ]; then
                echo "🎯 New routine for today: $new_routine_title"
              else
                echo "🔒 No specific routine for today (might be Sunday)"
              fi
            fi
            
          else
            echo "❌ Failed to unlock next challenge day"
            echo "Response: $unlock_response"
            
            # Verificar si hay un error específico
            if echo "$unlock_response" | grep -q '"error"'; then
              error_message=$(echo "$unlock_response" | grep -o '"error":"[^"]*"' | cut -d'"' -f4)
              echo "❌ Error details: $error_message"
            fi
            
            exit 1
          fi
