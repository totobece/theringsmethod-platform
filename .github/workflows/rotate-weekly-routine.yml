name: Rotate Weekly Routine

on:
  schedule:
    # Ejecutar todos los lunes a las 00:00 UTC (inicio de semana)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Permitir ejecución manual para testing

jobs:
  rotate-weekly-routine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Rotate weekly routine
        run: |
          echo "🗓️ Rotating weekly routine..."
          echo "📅 Current date: $(date)"
          
          response=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Cron" \
            "https://8a86-2802-8010-9545-a100-fb0d-e8e9-3d82-3922.ngrok-free.app/api/supabase/weekly-routine")
          
          echo "📝 API Response: $response"
          
          # Verificar si la respuesta contiene "success"
          if echo "$response" | grep -q '"success":true'; then
            echo "✅ Weekly routine rotated successfully!"
            
            # Extraer información de la semana actual
            current_week=$(echo "$response" | grep -o '"currentWeek":[0-9]*' | cut -d':' -f2)
            routines_count=$(echo "$response" | grep -o '"routines":\[[^]]*\]' | grep -o '},{' | wc -l)
            # Sumar 1 porque wc -l cuenta las comas, no los elementos
            routines_count=$((routines_count + 1))
            
            echo "📊 Current week: $current_week"
            echo "🎯 Routines loaded for this week: $routines_count"
            
            # Mostrar detalles de las rutinas si están disponibles
            if echo "$response" | grep -q '"routines"'; then
              echo "📋 Weekly routines schedule:"
              echo "$response" | grep -o '"day":"[^"]*"' | sed 's/"day":"//g; s/"//g' | sort | while read day; do
                echo "  - $day"
              done
            fi
          else
            echo "❌ Failed to rotate weekly routine"
            echo "Response: $response"
            
            # Verificar si hay un error específico
            if echo "$response" | grep -q '"error"'; then
              error_message=$(echo "$response" | grep -o '"error":"[^"]*"' | cut -d'"' -f4)
              echo "❌ Error details: $error_message"
            fi
            
            exit 1
          fi
