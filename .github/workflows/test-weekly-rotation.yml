name: Test Weekly Routine Rotation

on:
  schedule:
    # Ejecutar cada 10 minutos para testing (puedes ajustar o eliminar después)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permitir ejecución manual para testing

jobs:
  test-weekly-rotation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Test weekly routine rotation
        run: |
          echo "🧪 Testing weekly routine rotation..."
          echo "📅 Current date: $(date)"
          
          # Primero obtener el estado actual
          echo "📊 Getting current week status..."
          current_response=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            "https://8a86-2802-8010-9545-a100-fb0d-e8e9-3d82-3922.ngrok-free.app/api/supabase/weekly-routine")
          
          echo "📋 Current state: $current_response"
          
          if echo "$current_response" | grep -q '"success":true'; then
            current_week=$(echo "$current_response" | grep -o '"currentWeek":[0-9]*' | cut -d':' -f2)
            echo "📍 Current week before rotation: $current_week"
          fi
          
          # Ahora realizar la rotación
          echo "🔄 Performing weekly rotation..."
          rotation_response=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Cron" \
            "https://8a86-2802-8010-9545-a100-fb0d-e8e9-3d82-3922.ngrok-free.app/api/supabase/weekly-routine")
          
          echo "📝 Rotation Response: $rotation_response"
          
          # Verificar si la rotación fue exitosa
          if echo "$rotation_response" | grep -q '"success":true'; then
            echo "✅ Weekly routine rotated successfully!"
            
            # Extraer información de la nueva semana
            new_week=$(echo "$rotation_response" | grep -o '"currentWeek":[0-9]*' | cut -d':' -f2)
            routines_count=$(echo "$rotation_response" | grep -o '"routines":\[[^]]*\]' | grep -o '},{' | wc -l)
            routines_count=$((routines_count + 1))
            
            echo "📊 New current week: $new_week"
            echo "🎯 Routines loaded for this week: $routines_count"
            
            # Mostrar detalles de las rutinas
            if echo "$rotation_response" | grep -q '"routines"'; then
              echo "📋 Weekly routines schedule:"
              echo "$rotation_response" | grep -o '"day":"[^"]*"' | sed 's/"day":"//g; s/"//g' | sort | while read day; do
                echo "  - $day"
              done
            fi
            
            # Verificar que la semana cambió correctamente
            if [ "$current_week" ] && [ "$new_week" ]; then
              expected_week=$((current_week % 4 + 1))
              if [ "$new_week" -eq "$expected_week" ]; then
                echo "✅ Week progression is correct: $current_week → $new_week"
              else
                echo "⚠️ Week progression might be unexpected: $current_week → $new_week (expected: $expected_week)"
              fi
            fi
            
          else
            echo "❌ Failed to rotate weekly routine"
            echo "Response: $rotation_response"
            
            # Verificar si hay un error específico
            if echo "$rotation_response" | grep -q '"error"'; then
              error_message=$(echo "$rotation_response" | grep -o '"error":"[^"]*"' | cut -d'"' -f4)
              echo "❌ Error details: $error_message"
            fi
            
            exit 1
          fi
