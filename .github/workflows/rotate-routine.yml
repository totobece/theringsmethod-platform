name: Rotate Daily Routine

on:
  schedule:
    # Ejecutar cada 2 minutos para testing
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permitir ejecución manual para testing

jobs:
  rotate-routine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Rotate routine
        run: |
          echo "🔄 Rotating daily routine..."
          
          response=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Cron" \
            "http://localhost:3000/api/supabase/daily-routine")
          
          echo "📝 API Response: $response"
          
          # Verificar si la respuesta contiene "success"
          if echo "$response" | grep -q "success"; then
            echo "✅ Daily routine rotated successfully!"
            
            # Extraer información de la rutina actual
            current_routine=$(echo "$response" | grep -o '"title":"[^"]*"' | cut -d'"' -f4)
            episode=$(echo "$response" | grep -o '"episode":"[^"]*"' | cut -d'"' -f4)
            
            echo "🎯 Current daily routine: $episode - $current_routine"
          else
            echo "❌ Failed to rotate daily routine"
            echo "Response: $response"
            exit 1
          fi
